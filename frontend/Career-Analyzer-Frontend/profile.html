<style>
a{

    position:relative;

    text-decoration:none !important;

    transition:.3s;

}

/* Animated Underline */

a::after{

    content:"";

    position:absolute;

    left:0;

    bottom:-3px;

    width:0%;

    height:2px;

    background:#4f46e5;

    transition:width .3s ease;

}

a:hover::after{

    width:100%;

}

/* Navbar Links */

.nav-link{

    font-weight:600;

}

.nav-link:hover{

    color:#60a5fa !important;

}

.nav-link.active::after{

    width:100%;

}

/* Dashboard Quick Access Links */

.text-decoration-none{

    display:block;

}

.text-decoration-none:hover{

    color:inherit;

}

/* Brand Link */

.navbar-brand{

    font-weight:700;

}

.navbar-brand::after{

    background:#ffffff;

}

/* Footer Links (if added later) */
footer{
    margin-top:80px;
    background:#111827;
    color:rgb(255, 255, 255);
}

footer p,
footer small{
    color:#d1d5db;
}

.card{

    border:none;

    border-radius:22px;

    background:linear-gradient(145deg,#ffffff,#f8fbff);

    box-shadow:
    0 10px 25px rgba(0,0,0,.08),
    0 2px 6px rgba(0,0,0,.04);

    transition:all .35s ease;

    overflow:hidden;

    position:relative;

}

/* Top Gradient Line */

.card::before{

    content:"";

    position:absolute;

    left:0;

    top:0;

    width:100%;

    height:5px;

    background:linear-gradient(
    90deg,
    #4f46e5,
    #06b6d4,
    #10b981
    );

}

/* Hover Effect */

.card:hover{

    transform:translateY(-8px);

    box-shadow:
    0 20px 35px rgba(79,70,229,.18),
    0 10px 15px rgba(0,0,0,.08);

}

/* Card Titles */

.card h2{

    font-weight:700;

    color:#4f46e5;

}

.card h3{

    font-weight:700;

    color:#4f46e5;

}

.card h4{

    font-weight:700;

    color:#4f46e5;

}

.card h5{

    font-weight:600;

    color:#1f2937;

}

.card h6{

    font-weight:600;

    color:#374151;

}

/* Paragraph */

.card p{

    color:#6b7280;

    line-height:1.7;

}

/* Icons */

.card i{

    color:#4f46e5;

    transition:.3s;

}

.card:hover i{

    transform:scale(1.2);

}

/* ===========================
   STATISTICS CARDS
=========================== */

.stat-card{

    background:linear-gradient(
    135deg,
    #eef4ff,
    #ffffff
    );

    text-align:center;

    padding:20px;

}

.stat-number{

    font-size:42px;

    font-weight:800;

    color:#4f46e5;

}

/* ===========================
   BEST MATCH CARD
=========================== */

.best-match{

    background:linear-gradient(
    135deg,
    #4f46e5,
    #7c3aed
    );

    color:white;

}

.best-match h2,
.best-match h4,
.best-match h5{

    color:white;

}

.best-match .progress{

    height:24px;

    border-radius:50px;

}

/* ===========================
   QUICK ACCESS CARDS
=========================== */

.text-decoration-none .card{

    cursor:pointer;

    min-height:180px;

    display:flex;

    justify-content:center;

    align-items:center;

}

.text-decoration-none .card h2{

    font-size:45px;

    transition:.3s;

}

.text-decoration-none:hover .card{

    background:linear-gradient(
    145deg,
    #eef7ff,
    #ffffff
    );

}

.text-decoration-none:hover h2{

    transform:scale(1.2) rotate(6deg);

}

/* ===========================
   PROFILE SUMMARY CARDS
=========================== */

.card .bi{

    margin-right:8px;

}

/* ===========================
   CANVAS CARD
=========================== */

canvas{

    margin-top:15px;

}

/* ===========================
   RESPONSIVE
=========================== */

@media(max-width:768px){

.card{

margin-bottom:20px;

}

.stat-number{

font-size:32px;

}

}
</style>

</head>
