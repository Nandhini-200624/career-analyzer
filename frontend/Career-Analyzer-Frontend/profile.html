<!DOCTYPE html>
<html>
<head>

    <title>User Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="bg-blobs"></div>

<div class="hero-section">

    <h1>User Profile</h1>

    <p>Your career analysis overview</p>

</div>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand">
            Career Analyzer
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarMenu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       href="dashboard.html">
                        Overview
                    </a>
                </li>

            
                <li class="nav-item">
                    <a class="nav-link"
                       href="skills.html">
                        Skills
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="jobs.html">
                        Jobs
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="roadmap.html">
                        Roadmap
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="reports.html">
                        Reports
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active"
                       href="profile.html">
                        Profile
                    </a>
                </li>

            </ul>

            <div class="d-flex gap-2 ms-3">

                <button class="btn btn-outline-light"
                        onclick="toggleTheme()">
                    🌙 Theme
                </button>

                <button class="btn btn-outline-danger"
                        onclick="logout()">
                    Logout
                </button>

            </div>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="card p-4 mb-4">

        <h3>
            <i class="bi bi-person-circle"></i>
            Profile Information
        </h3>

        <hr>

        <p>
            <strong>Email:</strong>
            <span id="email"></span>
        </p>

        <p>
            <strong>Domain:</strong>
            <span id="domain"></span>
        </p>

        <p>
            <strong>Career Goal:</strong>
            <span id="goal"></span>
        </p>

    </div>

    <div class="card p-4">

        <h4>
            Skills Summary
        </h4>

        <div id="skills"></div>

    </div>

</div>

<footer class="text-center mt-5 p-4">

    <h6>Career Analyzer</h6>

    <p>
        AI-Powered Career Guidance Platform
    </p>

    <small>
        © 2026 Career Analyzer | Final Year Project
    </small>

</footer>

<script src="js/app.js"></script>

<script>

document.getElementById(
"email"
).innerText =
localStorage.getItem(
"username"
);

fetch(
`${BASE_URL}/api/dashboard/1`
)
.then(res => res.json())
.then(data => {

document.getElementById(
"domain"
).innerText =
data.interestedDomain || "-";

document.getElementById(
"goal"
).innerText =
data.careerGoal || "-";

const skills =
(data.currentSkills || "")
.split(",");

document.getElementById(
"skills"
).innerHTML =
skills.map(skill => `
<span
class="badge bg-primary m-1 p-2">
${skill.trim()}
</span>
`).join("");

});

</script>

</body>
</html>
