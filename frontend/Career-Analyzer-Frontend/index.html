<!DOCTYPE html>
<html>
<head>
    <title>Career Analyzer Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="bg-blobs"></div>

<!-- Hero Section -->
<div class="hero-section">
    <h1>Career Analyzer</h1>
    <p>AI-Powered Career Guidance Platform</p>
</div>

<div class="container mt-5">

    <div class="row align-items-center">

        <!-- Left Side Image -->
        <div class="col-lg-6 text-center mb-4">
            <img
                src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f"
                class="img-fluid rounded-4 shadow"
                alt="Career Guidance">
        </div>

        <!-- Login Card -->
        <div class="col-lg-6">

            <div class="card shadow-lg p-4">

                <h2 class="text-center mb-3">
                    Welcome Back
                </h2>

                <p class="text-center text-muted">
                    Enter your email to continue
                </p>

                <input
                    type="email"
                    id="username"
                    class="form-control mb-3"
                    placeholder="Enter Email">

                <button
                    class="btn btn-primary w-100"
                    onclick="login()">
                    Login
                </button>

            </div>

        </div>

    </div>

    <!-- Features -->
    <div class="row mt-5">

        <div class="col-md-4 mb-3">
            <div class="card p-3 text-center">
                <h4>🎯 Career Matching</h4>
                <p>Find jobs aligned with your skills.</p>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card p-3 text-center">
                <h4>📄 Resume Analysis</h4>
                <p>AI extracts skills and interests.</p>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card p-3 text-center">
                <h4>🛣 Learning Roadmap</h4>
                <p>Get a personalized growth plan.</p>
            </div>
        </div>

    </div>

</div>

<footer class="text-center mt-5">
    Career Analyzer © 2026
</footer>

<script src="js/app.js"></script>

</body>
</html>
