<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Manual Skills Entry</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="bg-blobs"></div>

<!-- Hero -->

<div class="hero-section">

<h1>Manual Skills Entry</h1>

<p>

We couldn't detect skills from your resume.
Please enter them manually.

</p>

</div>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow p-5">

<h3 class="mb-4">

<i class="bi bi-pencil-square"></i>

Enter Your Skills

</h3>

<p class="text-muted">

Separate each skill with a comma.

</p>
<textarea
id="manualSkills"
class="form-control"
rows="8"
placeholder="Example:
Java,
Spring Boot,
MySQL,
HTML,
CSS,
JavaScript">
</textarea>

<div class="mt-4">

<button
class="btn btn-primary"
onclick="submitManualSkills()">

Analyze Skills

</button>

<button
class="btn btn-secondary ms-2"
onclick="clearSkills()">

Clear

</button>

</div>


</div>

</div>

</div>

</div>

<footer class="text-center mt-5 p-4">

    <h6>Career Analyzer</h6>

    <p>
        AI-Powered Career Guidance Platform
    </p>

    <small>
        © 2026 Career Analyzer | Final Year Project
    </small>

</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/config.js"></script>


<script src="js/manualSkills.js"></script>

</body>

</html>
